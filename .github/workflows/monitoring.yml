name: Deploy Monitoring (PROD)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy"
        required: true
        default: "main"

jobs:
  deploy-monitoring:
    runs-on: [self-hosted, Linux, X64, k8s]

    steps:
      - name: Checkout clean
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
          fetch-depth: 0
          clean: true

      - name: Force sync repo (hard reset to remote)
        run: |
          git fetch origin
          git reset --hard origin/${{ github.event.inputs.branch }}
          git clean -fdx

      - name: Debug commit (verify correct version)
        run: |
          echo "Current branch:"
          git branch --show-current
          echo "Latest commit:"
          git log -1 --oneline

      - name: Setup kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" > kubeconfig
          echo "KUBECONFIG=$PWD/kubeconfig" >> $GITHUB_ENV

      - name: Set prod context
        run: |
          kubectl config use-context kubernetes-admin-prod

      - name: Verify cluster connection
        run: |
          kubectl get nodes

      - name: Apply monitoring manifests
        run: |
          kubectl apply -f k8s/monitoring -n monitoring-prod

      - name: Restart monitoring deployments
        run: |
          kubectl get deployments -n monitoring-prod -o name \
            | xargs -n1 kubectl rollout restart -n monitoring-prod

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment -n monitoring-prod --timeout=180s

      - name: Verify pods
        run: |
          kubectl get pods -n monitoring-prod -o wide
