name: CI/CD Pipeline — Prod (Force Clean Rebuild - No Tagging)

on:
workflow_dispatch:
inputs:
branch:
description: "Branch to deploy"
required: true
default: "main"

jobs:
build-push-deploy:
runs-on: [self-hosted, Linux, X64, k8s]

```
steps:
  # ------------------------
  # HARD CLEAN DOCKER
  # ------------------------
  - name: Clean Docker completely
    run: |
      docker stop $(docker ps -aq) || true
      docker rm $(docker ps -aq) || true
      docker system prune -a -f --volumes
      docker builder prune -a -f

  # ------------------------
  # CLEAN REPO
  # ------------------------
  - name: Checkout clean
    uses: actions/checkout@v4
    with:
      ref: ${{ github.event.inputs.branch }}
      fetch-depth: 0
      clean: true

  - name: Force sync repo (hard reset to remote)
    run: |
      git fetch origin
      git reset --hard origin/${{ github.event.inputs.branch }}
      git clean -fdx

  - name: Debug commit (verify correct version)
    run: |
      echo "Current branch:"
      git branch --show-current
      echo "Latest commit:"
      git log -1 --oneline

  # ------------------------
  # BUILD JARS
  # ------------------------
  - name: Setup Java
    uses: actions/setup-java@v4
    with:
      java-version: "17"
      distribution: "temurin"

  - name: Build JARs
    run: mvn clean package -DskipTests

  # ------------------------
  # DOCKER LOGIN
  # ------------------------
  - name: Login to Docker Hub
    uses: docker/login-action@v3
    with:
      username: ${{ secrets.DOCKER_USERNAME }}
      password: ${{ secrets.DOCKER_PASSWORD }}

  # ------------------------
  # BUILD (NO CACHE, OVERWRITE)
  # ------------------------
  - name: Build images (clean overwrite)
    run: |
      SERVICES=(
        spring-petclinic-admin-server
        spring-petclinic-api-gateway
        spring-petclinic-config-server
        spring-petclinic-customers-service
        spring-petclinic-discovery-server
        spring-petclinic-genai-service
        spring-petclinic-vets-service
        spring-petclinic-visits-service
      )

      for SVC in "${SERVICES[@]}"; do
        echo "🚀 Building $SVC (clean)"

        docker build \
          --no-cache \
          --pull \
          -t ${{ secrets.DOCKER_USERNAME }}/$SVC:latest \
          ./$SVC
      done

  # ------------------------
  # PUSH (OVERWRITE LATEST)
  # ------------------------
  - name: Push images
    run: |
      SERVICES=(
        spring-petclinic-admin-server
        spring-petclinic-api-gateway
        spring-petclinic-config-server
        spring-petclinic-customers-service
        spring-petclinic-discovery-server
        spring-petclinic-genai-service
        spring-petclinic-vets-service
        spring-petclinic-visits-service
      )

      for SVC in "${SERVICES[@]}"; do
        echo "📦 Pushing $SVC"

        docker push ${{ secrets.DOCKER_USERNAME }}/$SVC:latest
      done

  # ------------------------
  # K8S SETUP
  # ------------------------
  - name: Setup kubeconfig
    run: |
      echo "${{ secrets.KUBE_CONFIG }}" > kubeconfig
      echo "KUBECONFIG=$PWD/kubeconfig" >> $GITHUB_ENV

  - name: Set prod context
    run: kubectl config use-context kubernetes-admin-prod

  - name: Verify cluster connection
    run: kubectl get nodes

  # ------------------------
  # FORCE DEPLOY
  # ------------------------
  - name: Force restart all pods
    run: |
      kubectl delete pod --all -n prod
      kubectl rollout status deployment -n prod --timeout=300s

  # ------------------------
  # VERIFY
  # ------------------------
  - name: Verify
    run: kubectl get pods -n prod -o wide
```
