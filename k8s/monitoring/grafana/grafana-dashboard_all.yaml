apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-node
  namespace: monitoring-prod
data:
  node-dashboard.json: |
    {
      "title": "Node Exporter Basic",
      "schemaVersion": 38,
      "version": 1,
      "panels": [
        {
          "type": "timeseries",
          "title": "CPU Usage - controlplane",
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "100 - (avg(rate(node_cpu_seconds_total{mode=\"idle\", nodename=\"k8scontrolplain\"}[$__rate_interval])) * 100)",
              "refId": "A"
            }
          ],
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 }
        },
        {
          "type": "timeseries",
          "title": "CPU Usage - worker1",
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "100 - (avg(rate(node_cpu_seconds_total{mode=\"idle\", nodename=\"k8sworker1\"}[$__rate_interval])) * 100)",
              "refId": "A"
            }
          ],
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 }
        },
        {
          "type": "timeseries",
          "title": "CPU Usage - worker2",
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "100 - (avg(rate(node_cpu_seconds_total{mode=\"idle\", nodename=\"k8sworker2\"}[$__rate_interval])) * 100)",
              "refId": "A"
            }
          ],
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 }
        },
        {
          "type": "timeseries",
          "title": "CPU Usage - worker3",
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "100 - (avg(rate(node_cpu_seconds_total{mode=\"idle\", nodename=\"k8sworker3\"}[$__rate_interval])) * 100)",
              "refId": "A"
            }
          ],
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 8 }
        }
      ]
    }
