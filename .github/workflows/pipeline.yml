name: CI/CD Pipeline — Prod

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:

# ------------------------
# 1. BUILD & PUSH
# ------------------------
  build-and-push:
    runs-on: [self-hosted, Linux, X64, k8s]

    strategy:
      matrix:
        service:
          - spring-petclinic-admin-server
          - spring-petclinic-api-gateway
          - spring-petclinic-config-server
          - spring-petclinic-customers-service
          - spring-petclinic-discovery-server
          - spring-petclinic-genai-service
          - spring-petclinic-vets-service
          - spring-petclinic-visits-service
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          mvn spring-boot:build-image \
            -pl ${{ matrix.service }} \
            -Dspring-boot.build-image.publish=true \
            -Dspring-boot.build-image.imageName=ross1832/${{ matrix.service }}:${SHORT_SHA} \
            --batch-mode -DskipTests

      - name: Cleanup local image
        run: docker image rm ross1832/${{ matrix.service }}:${GITHUB_SHA::7} || true


# ------------------------
# 2. DEPLOY PROD
# ------------------------
  deploy-prod:
    needs: build-and-push
    runs-on: [self-hosted, Linux, X64, k8s]
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - name: Deploy all services to prod
        run: |
          SHORT_SHA=${GITHUB_SHA::7}

          kubectl apply -f k8s/ -n prod

          for SVC in admin-server api-gateway config-server customers-service \
                      discovery-server genai-service vets-service visits-service; do
            kubectl set image deployment/${SVC} \
              ${SVC}=ross1832/spring-petclinic-${SVC}:${SHORT_SHA} -n prod
          done

          kubectl rollout status deployment -n prod --timeout=300s


# ------------------------
# 3. DEPLOY PROD (monitoring)
# ------------------------
  deploy-prod-monitoring:
    needs: build-and-push
    runs-on: [self-hosted, Linux, X64, k8s]
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - name: Deploy monitoring stack
        run: kubectl apply -R -f k8s/monitoring/ -n monitoring-prod
