apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring-dev
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:

      # ==========================================
      #  Kubernetes Pods (Spring Apps)
      # ==========================================
      - job_name: 'kubernetes-pods'

        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - dev

        relabel_configs:
          # nur Pods mit scrape annotation
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"

          # metrics path (fallback /actuator/prometheus)
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)

          # port setzen
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__

          # labels übernehmen
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)

          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace

          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod


      # ==========================================
      #  Kubernetes Nodes (cAdvisor)
      # ==========================================
      - job_name: 'kubernetes-nodes-cadvisor'

        scheme: https

        kubernetes_sd_configs:
          - role: node

        tls_config:
          insecure_skip_verify: true

        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token

        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)

          - target_label: __address__
            replacement: kubernetes.default.svc:443

          - source_labels: [__meta_kubernetes_node_name]
            target_label: __metrics_path__
            replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor


      # ==========================================
      #  Node Exporter (FIXED CLEAN DYNAMIC)
      # ==========================================
      - job_name: 'node-exporter'

        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names:
                - monitoring-dev

        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name]
            action: keep
            regex: node-exporter

        #  - source_labels: [__meta_kubernetes_endpoint_port_number]  #issues with prom scraping
        #    action: keep                                             #fixed by delete this
        #    regex: "9100"                                            #now will scrape all nodes in monitoring-dev


      # ==========================================
      #  kube-state-metrics (CLEAN)
      # ==========================================
      - job_name: 'kube-state-metrics'

        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names:
                - monitoring-dev

        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name]
            action: keep
            regex: kube-state-metrics