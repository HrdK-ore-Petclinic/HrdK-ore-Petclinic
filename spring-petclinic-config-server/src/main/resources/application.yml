server.port: 8888

spring:
  cloud:
    config:
      server:
        git:
          uri: https://github.com/spring-petclinic/spring-petclinic-microservices-config
          default-label: main
        native:
          searchLocations: file:///${GIT_REPO}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    prometheus:
      enabled: false
    health:
      probes:
        enabled: true
      show-details: always
  health:
    config-server:
      enabled: false