name: CI/CD — Prod

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to deploy — format MUST be v#.#.# (e.g. v1.2.0)"
        required: true
      service:
        description: "Service to deploy (all = controlled rollout in dependency order)"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - spring-petclinic-admin-server
          - spring-petclinic-api-gateway
          - spring-petclinic-config-server
          - spring-petclinic-customers-service
          - spring-petclinic-discovery-server
          - spring-petclinic-genai-service
          - spring-petclinic-vets-service
          - spring-petclinic-visits-service

concurrency:
  group: prod-deploy
  cancel-in-progress: false

jobs:

  # ------------------------
  # 1. VALIDATE
  # ------------------------
  validate:
    runs-on: [self-hosted, Linux, X64, k8s]

    steps:

      - name: Validate version format
        run: |
          VERSION="${{ github.event.inputs.version }}"

          if ! echo "$VERSION" | grep -qP '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "❌ Invalid version format: '$VERSION'"
            echo "   Required format: v#.#.# (e.g. v1.0.0, v2.14.3)"
            echo "   NOT allowed: SHA tags, 'dev', 'latest', empty strings"
            echo ""
            echo "   Only versions created by the promotion pipeline are accepted here."
            exit 1
          fi

          echo "✅ Version valid: $VERSION"

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Verify version exists on Docker Hub
        run: |
          VERSION="${{ github.event.inputs.version }}"
          SELECTED="${{ github.event.inputs.service }}"

          SERVICES_TO_CHECK=""
          if [ "$SELECTED" = "all" ]; then
            SERVICES_TO_CHECK="spring-petclinic-admin-server
            spring-petclinic-api-gateway
            spring-petclinic-config-server
            spring-petclinic-customers-service
            spring-petclinic-discovery-server
            spring-petclinic-genai-service
            spring-petclinic-vets-service
            spring-petclinic-visits-service"
          else
            SERVICES_TO_CHECK="$SELECTED"
          fi

          MISSING=()
          for SVC in $SERVICES_TO_CHECK; do
            IMAGE="${{ secrets.DOCKER_USERNAME }}/$SVC:$VERSION"
            if ! docker manifest inspect "$IMAGE" > /dev/null 2>&1; then
              echo "❌ Not found on Docker Hub: $IMAGE"
              MISSING+=("$SVC")
            else
              echo "✅ Found: $IMAGE"
            fi
          done

          if [ ${#MISSING[@]} -gt 0 ]; then
            echo ""
            echo "❌ Missing images for version $VERSION:"
            printf '   - %s\n' "${MISSING[@]}"
            echo ""
            echo "   Run the promotion pipeline first to create $VERSION tags."
            exit 1
          fi

          echo ""
          echo "✅ All required images exist for version $VERSION"

  # ------------------------
  # 2. DEPLOY (controlled rollout)
  # ------------------------
  deploy:
    needs: validate
    runs-on: [self-hosted, Linux, X64, k8s]
    environment: prod

    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Verify cluster connection
        run: |
          kubectl config current-context
          kubectl get nodes

      # ------------------------
      # Deploy helper — defined as shell function, reused below
      # ------------------------
      - name: Deploy services (controlled rollout)
        run: |
          VERSION="${{ github.event.inputs.version }}"
          SELECTED="${{ github.event.inputs.service }}"
          REGISTRY="${{ secrets.DOCKER_USERNAME }}"

          # Deploy single service with:
          #   - manifest apply
          #   - image update
          #   - rollout status with diagnostics on failure
          deploy_service() {
            local SHORT=$1
            local FULL="spring-petclinic-${SHORT}"
            local IMAGE="${REGISTRY}/${FULL}:${VERSION}"
            local TIMEOUT=${2:-600s}

            echo ""
            echo "=============================="
            echo "🚀 Deploying: $SHORT"
            echo "   Image   : $IMAGE"
            echo "   Timeout : $TIMEOUT"
            echo "=============================="

            kubectl apply -f k8s/${SHORT}-deployment.yaml -n prod
            kubectl apply -f k8s/${SHORT}-service.yaml -n prod

            kubectl set image deployment/${SHORT} \
              ${SHORT}=${IMAGE} \
              -n prod

            if ! kubectl rollout status deployment/${SHORT} -n prod --timeout=${TIMEOUT}; then
              echo ""
              echo "❌ Rollout failed for ${SHORT}"
              echo ""
              echo "=== Pod status ==="
              kubectl get pods -n prod -l app=${SHORT}
              echo ""
              echo "=== Pod events ==="
              kubectl describe pods -n prod -l app=${SHORT} | tail -80
              echo ""
              echo "💡 To rollback manually:"
              echo "   kubectl rollout undo deployment/${SHORT} -n prod"
              exit 1
            fi

            echo "✅ ${SHORT} deployed successfully"
          }

          # ------------------------
          # Single service deploy
          # ------------------------
          if [ "$SELECTED" != "all" ]; then
            SHORT=$(echo "$SELECTED" | sed 's/spring-petclinic-//')
            deploy_service "$SHORT" "600s"
            exit 0
          fi

          # ------------------------
          # Controlled rollout (all services, in dependency order)
          #
          # Order rationale for Spring Cloud:
          #   1. config-server     → serves config to everyone
          #   2. discovery-server  → service registry (Eureka)
          #   3. business services → need config + discovery ready
          #   4. api-gateway       → routes to business services
          #   5. genai-service     → longest startup, deploy last
          # ------------------------

          echo ""
          echo "=========================================="
          echo "🚀 CONTROLLED ROLLOUT — version ${VERSION}"
          echo "=========================================="

          # Foundation layer
          deploy_service "config-server"       "600s"
          deploy_service "discovery-server"    "600s"

          # Admin (depends on discovery)
          deploy_service "admin-server"        "600s"

          # Business services (depend on config + discovery)
          deploy_service "customers-service"   "600s"
          deploy_service "visits-service"      "600s"
          deploy_service "vets-service"        "600s"

          # Gateway (depends on business services being registered)
          deploy_service "api-gateway"         "600s"

          # GenAI last — slowest startup
          deploy_service "genai-service"       "900s"

          echo ""
          echo "🎉 Controlled rollout complete — all services deployed to prod"

  # ------------------------
  # 3. VERIFY
  # ------------------------
  verify:
    needs: deploy
    runs-on: [self-hosted, Linux, X64, k8s]
    if: always()

    steps:
      - name: Setup kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Show prod status
        run: |
          echo "=== Pods ==="
          kubectl get pods -n prod

          echo ""
          echo "=== Deployments with current images ==="
          kubectl get deployments -n prod \
            -o custom-columns=NAME:.metadata.name,IMAGE:.spec.template.spec.containers[0].image

      - name: Deployment summary
        if: success()
        run: |
          VERSION="${{ github.event.inputs.version }}"
          SERVICE="${{ github.event.inputs.service }}"

          echo "======================================"
          echo "✅ DEPLOYMENT SUCCESSFUL"
          echo "======================================"
          echo "Version     : $VERSION"
          echo "Service(s)  : $SERVICE"
          echo "Deployed by : ${{ github.actor }}"
          echo "Time (UTC)  : $(date -u +'%Y-%m-%d %H:%M:%S')"
          echo "======================================"git a