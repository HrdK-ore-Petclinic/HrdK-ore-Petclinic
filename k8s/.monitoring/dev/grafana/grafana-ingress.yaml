apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress
  namespace: monitoring-dev   # was dev before, was not wokring
spec:
  ingressClassName: nginx
  rules:
  - host: grafana-dev.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: grafana-service   # name was incorrect
            port:
              number: 3000
              