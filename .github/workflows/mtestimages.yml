name: Build Config Server Image

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to build"
        required: true
        default: "main"

env:
  IMAGE_NAME: config-server

jobs:
  build-image:
    runs-on: [self-hosted, Linux, X64, k8s]

    steps:
      - name: Checkout clean
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
          fetch-depth: 0
          clean: true

      - name: Force sync repo (hard reset)
        run: |
          git fetch origin
          git reset --hard origin/${{ github.event.inputs.branch }}
          git clean -fdx

      - name: Debug commit
        run: |
          echo "Current branch:"
          git branch --show-current
          echo "Latest commit:"
          git log -1 --oneline

      - name: Login to registry
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.REGISTRY_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .

      - name: Push image (SHA tag)
        run: |
          docker push ${{ secrets.REGISTRY_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Tag + push latest
        run: |
          docker tag ${{ secrets.REGISTRY_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ secrets.REGISTRY_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ secrets.REGISTRY_USERNAME }}/${{ env.IMAGE_NAME }}:latest
